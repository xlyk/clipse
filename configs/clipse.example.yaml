# Clipse configuration example.
# Copy to configs/clipse.yaml (or point CLIPSE_CONFIG at it) and fill in your values.
# All durations are in seconds unless noted.

# repo: the single repository clipse manages.
repo:
  # remote is the GitHub remote URL (HTTPS or SSH).
  remote: "https://github.com/yourorg/yourrepo.git"
  # path is the local absolute path to the primary clone.
  path: "/home/you/code/yourrepo"
  # base_branch is the branch workers branch off and PRs target.
  base_branch: "main"
  # require_checks controls how the Git-operator lane treats a PR with no
  # required CI checks reported. true (the default) waits for CI to register
  # (a repo whose CI registers late must not be blocked or merged early);
  # false lets the merge proceed on branch protection alone (a repo with no
  # CI). Optional; defaults to true.
  require_checks: true

# team_key / team_id: the Linear team clipse operates against. team_key
# scopes the candidate-issues query to this team; team_id resolves either
# workflow-state ids or state-label ids for SetState.
team_key: "CLI"
team_id: "8b5b3301-8da3-4933-9b07-9efc027bc09d"

# poll_interval_s: how often the dispatcher polls Linear for issue updates.
poll_interval_s: 30

# caps: concurrency limits for the dispatch loop.
caps:
  # global: maximum total workers running at once (all lanes combined).
  global: 8

  # per_lane: maximum concurrent workers per lane.
  per_lane:
    coder: 4
    reviewer: 2
    git_operator: 1

# turn_cap: maximum continuation turns a single issue may consume before the
# dispatcher parks it in Blocked. Bounds token spend on stuck issues.
turn_cap: 5

# max_runtime_s: wall-clock seconds before a running worker is killed and
# the issue is parked in Blocked (stale/hung detection).
max_runtime_s: 3600

# max_tokens_per_run: per-round context (input-token) ceiling passed to the
# worker as --max-tokens -- the largest single DAC round's input the worker
# will allow before blocking with outcome=blocked, block_kind=capability,
# naming the spend in its summary. This is NOT a cumulative-spend cap: DAC's
# built-in auto-compaction already keeps each round small (tuned via the
# coder/reviewer profile's context_window_tokens, default 200k -> triggers
# around 170k/round), so this only catches a genuine post-compaction
# runaway. 400000 sits above that trigger (headroom for compaction) and
# well below any real model's context window. max_runtime_s/turn_cap are
# the backstops on total work across a run, not a single round.
max_tokens_per_run: 400000

# lane_label_prefix: Linear label prefix used to select a lane for an issue.
# e.g. the label "agent:coder" selects the coder lane.
lane_label_prefix: "agent:"

# state_label_prefix: optional label-backed board state. When omitted (the
# default), Clipse reads and writes Linear workflow states. When set, Clipse
# leaves the team's workflow untouched and uses exactly one of these labels:
# clipse:todo, clipse:ready, clipse:running, clipse:review, clipse:merging,
# clipse:done, clipse:rework, clipse:blocked. All eight labels must already
# exist on the configured team; dispatch startup preflights them before any
# issue can be claimed. No state label means todo. Conflicting or unknown
# labels in the reserved namespace read as blocked. Linear's completed and
# canceled workflow types remain terminal safety overrides. A done transition
# also removes the agent:<lane> opt-in label so completed work leaves the
# candidate queue. To requeue safely, remove clipse:done (or replace it with
# clipse:todo), reopen a completed/canceled Linear workflow into any
# non-terminal state when needed, then add agent:<lane> last. Terminal
# workflow types override labels.
# The state and lane prefixes must not overlap.
# state_label_prefix: "clipse:"

# max_attempts: maximum dispatch attempts for a single issue (across retries
# and dispatcher-restart requeues) before it is parked in Blocked instead of
# requeued again.
max_attempts: 3

# rework_cap: maximum number of times a single issue may cycle into Rework
# (the Reviewer lane's changes_requested, or the Git-operator lane's
# stale-base-conflict route) before the dispatcher parks it in Blocked
# instead, with a comment linking the PR and the last review — breaking
# what would otherwise be a possible infinite Coder<->Reviewer loop.
rework_cap: 3

# recover_cap / recover_backoff_s: auto-unblock layer 1. A *transient* failure
# (worker block_kind=transient, a run-level crash/malformed-result/timeout, or
# a spawn/workspace failure) is deterministically re-queued to its release
# column up to recover_cap times, each retry delayed by recover_backoff_s
# (via issues.blocked_until — a card in its backoff window is unclaimable), then
# parked in Blocked for good. Non-transient blocks (capability/needs_input),
# rework-cap exhaustion, illegal transitions, and orphan max_attempts always
# park immediately. recover_cap: 0 disables auto-recovery. recover_backoff_s
# defaults to poll_interval_s when omitted.
recover_cap: 5
recover_backoff_s: 30

# agent_backend: where DAC workers execute. Omitting this block preserves
# local mode. Daytona sandboxes stop after the configured idle interval;
# reviewer sandboxes are deleted after their own idle interval.
agent_backend:
  type: daytona
  daytona:
    auto_stop_minutes: 60
    reviewer_auto_delete_minutes: 60
    # snapshot: "snapshot-id-or-name"
    # target: "us"

# worker: how the dispatcher execs the clipse-worker subprocess. command is
# the argv PREFIX the Spawner execs for every worker invocation; the
# dispatcher appends the per-run flags (--issue/--lane/--run/--thread/
# --workspace/--checkpoint-db/--max-tokens) after it. clipse-worker is a uv
# console script defined in agent/pyproject.toml, so the common case runs it
# scoped to that project rather than requiring a global install. No
# default — machine-specific (an absolute --project path below), so this
# must be set explicitly.
worker:
  command:
    - uv
    - --project
    - "/absolute/path/to/clipse/agent"
    - run
    - clipse-worker

# models: the "provider:model" spec per DAC profile. Omit any key to keep the
# built-in default. Keep coder and reviewer on different model families so the
# reviewer isn't rubber-stamping its own sibling's code. openai_codex:* uses a
# one-time ChatGPT sign-in on the dispatcher host (see AGENTS.md), no API key.
models:
  coder: "anthropic:claude-sonnet-4-6"
  coder_docs: "anthropic:claude-sonnet-4-6"
  reviewer: "anthropic:claude-opus-4-6"

# model_params: optional per-lane kwargs passed to the model constructor
# (DAC create_model extra_kwargs). Overrides ~/.deepagents/config.toml provider
# params. Opaque to the kernel. Examples: codex reasoning effort, anthropic
# extended-thinking budget. Omit a lane to inherit config.toml / provider default.
# model_params:
#   coder: { reasoning_effort: high }
#   coder_docs: { reasoning_effort: low }
#   reviewer: { thinking: { type: enabled, budget_tokens: 10000 } }

# Per-profile shell posture for the DAC agents (coder / coder_docs /
# reviewer — same keying as models:). Each key is either the sentinel
# `all` (DEFAULT when omitted: the agent runs with an unrestricted shell,
# DAC auto_approve) or an explicit list of allowed command names, which
# restores the restrictive mode (allow-list enforced, plus DAC's own
# dangerous-pattern rejection of redirects/env-prefixes/heredocs — note
# that mode rejects habitual idioms like `2>&1` regardless of the list).
# With `all`, a prompt-injected issue body can run arbitrary shell in the
# worker env — see AGENTS.md's threat-model note; the C11 injection eval
# is the standing monitor.
# shell_allow_list:
#   coder: all
#   coder_docs: all
#   reviewer: [git, gh, ls, cat, head, tail, grep, rg, find, which, wc, diff, cd, test]

# checkpoints_dir: directory holding one LangGraph checkpointer SQLite
# database per issue (<checkpoints_dir>/<issue-identifier>.db), outside any
# git worktree — passed to the worker per-issue as --checkpoint-db. Defaults
# to "./.clipse/checkpoints" when omitted.
checkpoints_dir: "./.clipse/checkpoints"

# board_dir: the dispatcher's own state directory — kernel SQLite db,
# singleton lockfile, per-issue worker stderr logs, and git worktrees.
# Defaults to "./.clipse" when omitted; overridable per-invocation via
# `clipse dispatch --board`.
board_dir: "./.clipse"

# env_allowlist: environment variable names copied from the dispatcher's own
# process environment into a spawned worker's — nothing else is forwarded,
# so a worker never inherits secrets it doesn't need. The worker must NEVER
# see LINEAR_API_KEY (the kernel-only Linear credential); listing it here is
# a config error. Defaults to the list below when omitted.
env_allowlist:
  - ANTHROPIC_API_KEY
  - PATH
  - HOME
  - GH_TOKEN
  - GITHUB_TOKEN
  - TESTWORKER_SCENARIO
